<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CareFlow Hospital | Secure Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="frontend/css/common.css" />
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --card: #ffffff;
            --bg: #f9fafb;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.07), 0 10px 13px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: var(--card);
            border-radius: 20px;
            box-shadow: var(--shadow);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .login-form-section {
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-header {
            margin-bottom: 40px;
        }

        .login-header h1 {
            font-size: 28px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .role-selector {
            margin-bottom: 30px;
        }

        .role-selector label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .role-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .role-option {
            position: relative;
        }

        .role-option input {
            display: none;
        }

        .role-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            margin: 0;
            text-transform: capitalize;
        }

        .role-option input:checked + label {
            background: #e0e7ff;
            border-color: var(--primary);
            color: var(--primary);
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: #1d4ed8;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px rgba(37, 99, 235, 0.3);
        }

        .login-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        .demo-credentials {
            margin-top: 20px;
            padding: 12px;
            background: #f0f4ff;
            border-left: 4px solid var(--primary);
            border-radius: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .demo-credentials strong {
            color: var(--text-primary);
        }

        .login-visual {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .login-visual-icon {
            font-size: 80px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .login-visual h2 {
            font-size: 24px;
            margin-bottom: 16px;
        }

        .login-visual p {
            font-size: 14px;
            opacity: 0.9;
            line-height: 1.6;
        }

        .alert {
            margin-bottom: 20px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert.error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .alert.success {
            background: #dcfce7;
            color: #166534;
            border-left: 4px solid #10b981;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .login-container {
                grid-template-columns: 1fr;
            }

            .login-form-section {
                padding: 40px;
            }

            .login-visual {
                display: none;
            }

            .role-options {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-form-section">
            <div class="login-header">
                <h1>Welcome Back</h1>
                <p>Access your CareFlow Hospital account</p>
            </div>

            <div id="alert" class="alert"></div>

            <form id="loginForm">
                <div class="role-selector">
                    <label>Select Your Role</label>
                    <div class="role-options">
                        <div class="role-option">
                            <input type="radio" id="role-admin" name="role" value="admin" />
                            <label for="role-admin"><i class="fas fa-crown"></i> Admin</label>
                        </div>
                        <div class="role-option">
                            <input type="radio" id="role-receptionist" name="role" value="receptionist" />
                            <label for="role-receptionist"><i class="fas fa-headset"></i> Receptionist</label>
                        </div>
                        <div class="role-option">
                            <input type="radio" id="role-doctor" name="role" value="doctor" />
                            <label for="role-doctor"><i class="fas fa-stethoscope"></i> Doctor</label>
                        </div>
                        <div class="role-option">
                            <input type="radio" id="role-patient" name="role" value="patient" />
                            <label for="role-patient"><i class="fas fa-user"></i> Patient</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required />
                </div>

                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" name="remember" />
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Login</span>
                </button>

                <div class="demo-credentials">
                    <strong>Demo Credentials:</strong><br>
                    Admin: admin / admin123<br>
                    Other roles will be created through admin panel
                </div>
            </form>
        </div>

        <div class="login-visual">
            <div class="login-visual-icon">
                <i class="fas fa-hospital"></i>
            </div>
            <h2>CareFlow Hospital</h2>
            <p>Modern healthcare management system with secure role-based access control and premium design</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const alertDiv = document.getElementById('alert');
        const loginBtn = document.getElementById('loginBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(form);
            const data = {
                username: formData.get('username'),
                password: formData.get('password')
            };

            // Validate role selection
            const selectedRole = document.querySelector('input[name="role"]:checked');
            if (!selectedRole) {
                showAlert('Please select your role', 'error');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<div class="loading-spinner"></div><span>Logging in...</span>';

            try {
                const response = await fetch('backend/api/auth.php?action=login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('Login successful! Redirecting...', 'success');
                    // Redirect based on role
                    const role = selectedRole.value;
                    setTimeout(() => {
                        switch(role) {
                            case 'admin':
                                window.location.href = 'frontend/admin/dashboard.html';
                                break;
                            case 'receptionist':
                                window.location.href = 'frontend/receptionist/dashboard.html';
                                break;
                            case 'doctor':
                                window.location.href = 'frontend/doctor/dashboard.html';
                                break;
                            case 'patient':
                                window.location.href = 'frontend/patient/dashboard.html';
                                break;
                        }
                    }, 1500);
                } else {
                    showAlert(result.message || 'Login failed', 'error');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i><span>Login</span>';
                }
            } catch (error) {
                showAlert('An error occurred. Please try again.', 'error');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i><span>Login</span>';
                console.error('Error:', error);
            }
        });

        function showAlert(message, type) {
            alertDiv.textContent = message;
            alertDiv.className = `alert show ${type}`;
            if (type === 'success') {
                setTimeout(() => {
                    alertDiv.classList.remove('show');
                }, 3000);
            }
        }
    </script>
</body>
</html>
