<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CareFlow Hospital | Secure Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="auth-body">
    <div class="auth-shell">
      <div class="auth-card">
        <div class="auth-card__content">
          <div class="auth-brand">
            <img src="assets/icons/hospital-logo.svg" alt="CareFlow logo" />
            <div>
              <h1>CareFlow Hospital</h1>
              <p>Private Queue & Patient Operations</p>
            </div>
          </div>

          <div class="auth-copy">
            <h2>Welcome back</h2>
            <p>Access the hospital queue dashboard with secure staff credentials.</p>
          </div>

          <form id="login-form" class="auth-form">
            <label class="field">
              <span>Username</span>
              <input id="username" type="text" placeholder="Enter username" required />
            </label>
            <label class="field">
              <span>Password</span>
              <input id="password" type="password" placeholder="Enter password" required />
            </label>

            <div class="auth-form__meta">
              <label class="checkbox">
                <input type="checkbox" />
                <span>Remember me</span>
              </label>
              <a href="#">Forgot password?</a>
            </div>

            <button class="btn btn-primary btn-full" type="submit">
              <i class="fa-solid fa-right-to-bracket"></i>
              Login
            </button>
          </form>

          <p class="auth-demo">Demo access: admin / admin123</p>
        </div>

        <div class="auth-visual" aria-hidden="true">
          <div class="auth-visual__panel">
            <i class="fa-solid fa-stethoscope"></i>
            <h3>Modern care coordination</h3>
            <p>Deliver a refined patient journey from registration to discharge.</p>
          </div>
        </div>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
