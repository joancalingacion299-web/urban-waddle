<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CareFlow | Reports</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>
  <body data-page="reports">
    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <div class="brand">
          <img src="assets/icons/hospital-logo.svg" alt="CareFlow logo" />
          <div><h2>CareFlow</h2><p>Hospital Operations</p></div>
        </div>
        <nav class="nav-links">
          <a href="dashboard.html"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
          <a href="patient.html"><i class="fa-solid fa-user-plus"></i> Register Patient</a>
          <a href="queue.html"><i class="fa-solid fa-users"></i> Queue Management</a>
          <a href="display.html"><i class="fa-solid fa-display"></i> Queue Display</a>
          <a class="active" href="reports.html"><i class="fa-solid fa-chart-line"></i> Reports</a>
        </nav>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <button class="mobile-nav-toggle" id="mobile-nav-toggle" aria-label="Toggle navigation"><i class="fa-solid fa-bars"></i></button>
          <div>
            <h3>Reports</h3>
            <p>Track daily operations and patient flow.</p>
          </div>
          <div class="topbar-actions">
            <button class="icon-btn" id="theme-toggle" aria-label="Toggle dark mode"><i class="fa-solid fa-moon"></i></button>
            <button class="btn btn-primary"><i class="fa-solid fa-file-export"></i> Export</button>
            <button class="btn btn-secondary"><i class="fa-solid fa-print"></i> Print</button>
          </div>
        </header>

        <section class="stats-grid">
          <article class="stat-card accent-blue"><div class="stat-icon"><i class="fa-solid fa-hospital-user"></i></div><div><p>Total Patients</p><h3 id="report-total">0</h3></div></article>
          <article class="stat-card accent-success"><div class="stat-icon"><i class="fa-solid fa-check-circle"></i></div><div><p>Completed</p><h3 id="report-completed">0</h3></div></article>
          <article class="stat-card accent-warning"><div class="stat-icon"><i class="fa-solid fa-clock"></i></div><div><p>Waiting</p><h3 id="report-waiting">0</h3></div></article>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <h3>Patient records</h3>
            <div class="report-controls">
              <input type="search" id="search-input" placeholder="Search patient" />
              <select id="filter-department"><option value="All">All Departments</option><option>General Medicine</option><option>Pediatrics</option><option>Dental</option><option>Laboratory</option><option>Pharmacy</option><option>Emergency Room</option></select>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Patient ID</th><th>Name</th><th>Department</th><th>Status</th><th>Queue</th></tr></thead>
              <tbody id="report-table"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="js/app.js"></script>
    <script src="js/patient.js"></script>
    <script src="js/queue.js"></script>
  </body>
</html>
